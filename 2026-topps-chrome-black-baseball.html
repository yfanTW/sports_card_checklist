function splitPlayers(p){return p.split(' / ').map(s=>s.trim()).filter(Boolean);}
function getCardPlayers(card){
  if(card.players) return card.players.map(([name,team])=>({name,team}));
  const names=card.p.split(' / ').map(s=>s.trim()).filter(Boolean);
  if(names.length===1){const e={name:names[0],team:card.t};if(card.realTeam)e.realTeam=card.realTeam;return[e];}
  return names.map(name=>({name,team:PLAYER_TEAM[name]||card.t}));
}

function teamAbbrChip(team){

}
function cardTeamBadgesHTML(card){
  const players=getCardPlayers(card),seen=new Set(),badges=[];
  players.forEach(({team,realTeam})=>{
    if(realTeam){if(!seen.has(realTeam)){seen.add(realTeam);badges.push(`<span style="display:inline-flex;align-items:center;gap:3px">${teamBadgeHTML(realTeam)}<span style="font-size:10px;color:#64748b;font-weight:600">${team==="National League"?"NL":"AL"}</span></span>`);}}
    else{if(!seen.has(team)){seen.add(team);badges.push(teamBadgeHTML(team));}}
  });
  if(badges.length<=1)return`<span style="display:inline-flex;gap:4px">${badges.join("")}</span>`;
  return`<span style="display:inline-flex;flex-direction:column;gap:3px">${badges.join("")}</span>`;
}
function badgeHTML(text){
  const colors={
    "RC":{bg:"#fef3c7",color:"#92400e",border:"#fcd34d"},
    "Auto":{bg:"rgba(16,185,129,0.15)",color:"#34d399",border:"rgba(16,185,129,0.3)"},

    "Auto/Multi":{bg:"rgba(99,102,241,0.15)",color:"#818cf8",border:"rgba(99,102,241,0.3)"},
    "Auto/Patch":{bg:"rgba(249,115,22,0.15)",color:"#fb923c",border:"rgba(249,115,22,0.3)"},
  };
  const c=colors[text]||{bg:"rgba(255,255,255,0.08)",color:"#94a3b8",border:"rgba(255,255,255,0.12)"};

// ─── FILTER / SORT ────────────────────────────────────────────────────────────
function getFiltered(){
  let items=ALL_DATA;
  if(state.groupFilter!=="All") items=items.filter(d=>d.group===state.groupFilter);
  if(state.subCatFilter!=="All") items=items.filter(d=>d.cat===state.subCatFilter);
  if(state.teamFilter!=="All") items=items.filter(d=>
    getCardPlayers(d).some(({team,realTeam})=>{
      const t=realTeam||team;
      return getTeamAliases(state.teamFilter).includes(t);
    })
  );
  if(state.subFilter!=="All") items=items.filter(d=>d.sub===state.subFilter);
  if(state.rcFilter==="RC") items=items.filter(d=>splitPlayers(d.p).some(n=>isRC(n)));
  if(state.rcFilter==="Non-RC") items=items.filter(d=>!splitPlayers(d.p).some(n=>isRC(n)));
  if(state.search.trim()){
    const q=state.search.toLowerCase();
    items=items.filter(d=>
      d.p.toLowerCase().includes(q)||
      String(d.n).toLowerCase().includes(q)||
      getCardPlayers(d).some(({team})=>
        team.toLowerCase().includes(q)||
        getFranchise(team).toLowerCase().includes(q)
      )
    );
  }
  const pc=n=>{const m=String(n).match(/^([A-Za-z\-]*)(\d+)(.*)$/);return m?{prefix:m[1].toUpperCase(),num:parseInt(m[2]),suffix:m[3]}:{prefix:String(n).toUpperCase(),num:0,suffix:''};};
  if(state.sortBy==="number"){
    items=[...items].sort((a,b)=>{const pa=pc(a.n),pb=pc(b.n);if(pa.prefix!==pb.prefix)return pa.prefix.localeCompare(pb.prefix);if(pa.num!==pb.num)return pa.num-pb.num;return pa.suffix.localeCompare(pb.suffix);});
  } else if(state.sortBy==="player") items=[...items].sort((a,b)=>a.p.localeCompare(b.p));
  else if(state.sortBy==="team") items=[...items].sort((a,b)=>a.t.localeCompare(b.t));
  return items;
}
function getGroupCounts(){
  const c={};
  GROUP_ORDER.forEach(g=>{c[g]=ALL_DATA.filter(d=>d.group===g).length;});
  return c;
}
function getAvailableSubCats(){
  const src=state.groupFilter==="All"?ALL_DATA:ALL_DATA.filter(d=>d.group===state.groupFilter);
  const cats=[...new Set(src.map(d=>d.cat))];
  return cats.map(cat=>({cat,count:src.filter(d=>d.cat===cat).length}));
}

function renderStats(data){
  const teamCounts={},playerCounts={};
  data.forEach(d=>{
    const seen=new Set();
    getCardPlayers(d).forEach(({team,realTeam})=>{const t=getFranchise(realTeam||team);if(!seen.has(t)){seen.add(t);teamCounts[t]=(teamCounts[t]||0)+1;}});
  });
  // 球員計數：key = "name::team"，同一球員在不同球隊的卡分開計算
  data.forEach(d=>{
    getCardPlayers(d).forEach(({name,team,realTeam})=>{
      const t=realTeam||team;
      const key=name+'::'+t;
      if(!playerCounts[key]) playerCounts[key]={name,team:t,cnt:0};
      playerCounts[key].cnt++;
    });
  });
  const allSortedTeams=Object.entries(teamCounts).sort((a,b)=>b[1]-a[1]);
  const showAllTeams=!!state.statsShowAll["teams"];
  const sortedTeams=showAllTeams?allSortedTeams:allSortedTeams.slice(0,15);
  const maxTeam=allSortedTeams[0]?.[1]||1;
  const allSortedPlayers=Object.values(playerCounts).sort((a,b)=>b.cnt-a.cnt);
  const showAllPlayers=!!state.statsShowAll["players"];
  const sortedPlayers=showAllPlayers?allSortedPlayers:allSortedPlayers.slice(0,15);
  const maxPlayer=allSortedPlayers[0]?.cnt||1;
  const rcCount=new Set(data.flatMap(d=>splitPlayers(d.p).filter(n=>isRC(n)))).size;
  const autoCount=data.filter(d=>d.sub&&d.sub.startsWith("Auto")).length;
  return`
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">
    ${[["總卡數",data.length,"#6366f1"],["RC 新人卡",rcCount,"#f59e0b"],["簽名卡",autoCount,"#10b981"],["球隊數",[...new Set(data.flatMap(d=>getCardPlayers(d).map(({team,realTeam})=>getFranchise(realTeam||team))))].length,"#f97316"]].map(([label,val,color])=>`
      <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 14px">
        <span style="font-size:12px;color:#64748b;white-space:nowrap">${label}</span>
        <span style="font-family:'SF Mono',monospace;font-size:16px;font-weight:700;color:${color}">${val}</span>
      </div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:14px">
    <div style="background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,0.08)">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:14px">球隊出現次數</div>
      ${sortedTeams.map(([team,cnt],i)=>{
        const color=getTeamColor(team),abbr=getTeamAbbr(team),w=Math.round(cnt/maxTeam*100);
        const key='team:'+team,isOpen=!!state.statsExpanded[key];
        const teamCards=data.filter(d=>getCardPlayers(d).some(({team:t,realTeam})=>getFranchise(realTeam||t)===team));
        return`<div style="margin-bottom:4px">
          <div onclick="toggleStatsExpand('${key.replace(/'/g,"\\'")}') " style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;background:${isOpen?'rgba(99,102,241,0.06)':i%2===0?'#f8fafc':'transparent'};transition:background 0.15s">
            <span style="font-size:10px;color:${isOpen?'#6366f1':'#94a3b8'};transition:transform 0.2s;transform:${isOpen?'rotate(90deg)':'rotate(0deg)'};display:inline-block;width:14px;text-align:center;flex-shrink:0">▶</span>
            <span style="display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:20px;padding:0 5px;border-radius:4px;background:${color};color:#fff;font-size:10px;font-weight:800;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.15)">${abbr}</span>
            <span style="flex:1;font-size:12px;font-weight:500;color:#334155;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${team}</span>
            <span style="font-size:12px;color:#94a3b8;font-weight:600;min-width:28px;text-align:right;font-family:'SF Mono',monospace">${cnt}</span>
          </div>
          <div style="margin-left:22px;margin-bottom:2px">
            <div style="height:6px;border-radius:3px;background:#f1f5f9;overflow:hidden">
              <div style="height:100%;border-radius:3px;width:${w}%;background:${color}cc;min-width:2px;transition:width 0.4s ease"></div>
            </div>
          </div>
          ${isOpen?renderExpandedCards(teamCards,color):''}
        </div>`;
      }).join("")}
      ${allSortedTeams.length>15?`<button onclick="toggleStatsShowAll('teams')" style="margin-top:8px;width:100%;padding:8px 0;border:1px dashed #cbd5e1;border-radius:6px;background:transparent;color:#6366f1;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">${showAllTeams?"收起（顯示前 15 支）":"展開全部（共 "+allSortedTeams.length+" 支球隊）"}</button>`:""}
    </div>
    <div style="background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,0.08)">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:14px">球員出現次數</div>
      ${sortedPlayers.map(({name,team,cnt},i)=>{
        const color=getTeamColor(team),abbr=getTeamAbbr(team);
        const w=Math.round(cnt/maxPlayer*100);
        const key='p'+i,isOpen=!!state.statsExpanded[key];
        const pCards=data.filter(d=>getCardPlayers(d).some(pl=>pl.name===name&&(pl.realTeam||pl.team)===team));
        return`<div style="margin-bottom:4px">
          <div onclick="toggleStatsExpand('${key}') " style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;background:${isOpen?'rgba(99,102,241,0.06)':i%2===0?'#f8fafc':'transparent'};transition:background 0.15s">
            <span style="font-size:10px;color:${isOpen?'#6366f1':'#94a3b8'};transition:transform 0.2s;transform:${isOpen?'rotate(90deg)':'rotate(0deg)'};display:inline-block;width:14px;text-align:center;flex-shrink:0">▶</span>
            ${team?`<span style="display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:20px;padding:0 5px;border-radius:4px;background:${color};color:#fff;font-size:10px;font-weight:800;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.15)">${abbr}</span>`:""}
            <span style="flex:1;font-size:12px;font-weight:500;color:#334155;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
            <span style="font-size:12px;color:#94a3b8;font-weight:600;min-width:28px;text-align:right;font-family:'SF Mono',monospace">${cnt}</span>
          </div>
          <div style="margin-left:22px;margin-bottom:2px">
            <div style="height:6px;border-radius:3px;background:#f1f5f9;overflow:hidden">
              <div style="height:100%;border-radius:3px;width:${w}%;background:${color}cc;min-width:2px;transition:width 0.4s ease"></div>
            </div>
          </div>
          ${isOpen?renderExpandedCards(pCards,color):''}
        </div>`;
      }).join("")}
      ${allSortedPlayers.length>15?`<button onclick="toggleStatsShowAll('players')" style="margin-top:8px;width:100%;padding:8px 0;border:1px dashed #cbd5e1;border-radius:6px;background:transparent;color:#6366f1;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">${showAllPlayers?"收起（顯示前 15 人）":"展開全部（共 "+allSortedPlayers.length+" 位球員）"}</button>`:""}}).join("")}
      ${allSortedPlayers.length>15?`<button onclick="toggleStatsShowAll('players')" style="margin-top:8px;width:100%;padding:8px 0;border:1px dashed #cbd5e1;border-radius:6px;background:transparent;color:#6366f1;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">${showAllPlayers?"收起（顯示前 15 人）":"展開全部（共 "+allSortedPlayers.length+" 位球員）"}</button>`:""}
    </div>
  </div>`;
}

          </div>
        </div>
        ${M?`<div style="display:flex;gap:8px">
          <select onchange="setSort(this.value)" style="${ss};flex:1">
            <option value="number" ${state.sortBy==="number"?"selected":""}>按卡號排序</option>
            <option value="player" ${state.sortBy==="player"?"selected":""}>按球員排序</option>
            <option value="team" ${state.sortBy==="team"?"selected":""}>按球隊排序</option>
          </select>
        </div>`:""}
      </div>

      <!-- RESULT COUNT -->
      <div style="font-size:13px;color:#64748b;margin-bottom:12px">
        顯示 <strong style="color:#94a3b8">${filtered.length}</strong> 張卡片
        ${state.search||state.groupFilter!=="All"||state.teamFilter!=="All"||state.subFilter!=="All"||state.rcFilter!=="All"
          ?`<button onclick="clearFilters()" style="margin-left:10px;padding:2px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:11px;cursor:pointer;font-family:inherit">清除篩選</button>`:""}
      </div>

      ${state.view==="stats"?renderStats(filtered):renderList(filtered,M)}
    </div>
  </div>
  ${state.modalPlayer?renderModal(state.modalPlayer):""}
  `;
  // 保留搜尋框的焦點狀態，避免 render 打斷中文輸入法組字
  const prevInput = document.getElementById('search-input');
  const prevFocused = prevInput && document.activeElement === prevInput;
  const prevVal = prevFocused ? prevInput.value : null;

  document.getElementById('root').innerHTML=html;

  // 重新綁定搜尋事件（composition-aware，解決中文輸入法問題）
  const inp = document.getElementById('search-input');
  if (inp) {
    // Always set value from state (template no longer sets it)
    const restoreVal = prevFocused && prevVal !== null ? prevVal : state.search;
    inp.value = restoreVal;
    if (prevFocused) {
      inp.focus();
      inp.setSelectionRange(restoreVal.length, restoreVal.length);
    }
    let composing = false;
    inp.addEventListener('compositionstart', () => { composing = true; });
    inp.addEventListener('compositionupdate', () => { composing = true; });
    inp.addEventListener('compositionend', () => { composing = false; setSearch(inp.value); });
    inp.addEventListener('input', () => { if (!composing) setSearch(inp.value); });
  }
}

render();
</script>
</body>
</html>
