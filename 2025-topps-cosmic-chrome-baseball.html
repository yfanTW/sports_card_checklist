const RC_PLAYERS = new Set(
  ALL_DATA.filter(d=>d.group==="Base"&&d.sub==="RC").map(d=>d.p)
);
function isRC(name){return RC_PLAYERS.has(name);}

const PLAYER_TEAM = {};
ALL_DATA.forEach(d=>{
  const names=d.p.split(' / ').map(s=>s.trim()).filter(Boolean);
  if(names.length===1) PLAYER_TEAM[names[0]]=d.realTeam||d.t;
});

function splitPlayers(p){return p.split(' / ').map(s=>s.trim()).filter(Boolean);}

function getCardPlayers(card){
  if(card.players) return card.players.map(([name,team])=>({name,team}));
  const names=card.p.split(' / ').map(s=>s.trim()).filter(Boolean);
  if(names.length===1){
    const entry={name:names[0],team:card.t};
    if(card.realTeam) entry.realTeam=card.realTeam;
    return [entry];
  }
  return names.map(name=>({name,team:PLAYER_TEAM[name]||card.t}));
}

function getFiltered(){
  let items=ALL_DATA;
  if(state.groupFilter!=="All") items=items.filter(d=>d.group===state.groupFilter);
  if(state.subCatFilter!=="All") items=items.filter(d=>d.cat===state.subCatFilter);
  if(state.teamFilter!=="All") items=items.filter(d=>getCardPlayers(d).some(({team})=>team===state.teamFilter));
  if(state.subFilter!=="All") items=items.filter(d=>d.sub===state.subFilter);
  if(state.rcFilter==="RC") items=items.filter(d=>splitPlayers(d.p).some(n=>isRC(n)));
  if(state.rcFilter==="Non-RC") items=items.filter(d=>!splitPlayers(d.p).some(n=>isRC(n)));
  if(state.search.trim()){
    const q=state.search.toLowerCase();
    items=items.filter(d=>
      d.p.toLowerCase().includes(q)||
      getCardPlayers(d).some(({team})=>team.toLowerCase().includes(q))||
      String(d.n).toLowerCase().includes(q)
    );
  }
  if(state.sortBy==="number"){
    const pc=n=>{const m=String(n).match(/^([A-Za-z\-]*)(\d+)(.*)$/);return m?{prefix:m[1].toUpperCase(),num:parseInt(m[2]),suffix:m[3]}:{prefix:String(n).toUpperCase(),num:0,suffix:''};};
    items=[...items].sort((a,b)=>{const pa=pc(a.n),pb=pc(b.n);if(pa.prefix!==pb.prefix)return pa.prefix.localeCompare(pb.prefix);if(pa.num!==pb.num)return pa.num-pb.num;return pa.suffix.localeCompare(pb.suffix);});
  } else if(state.sortBy==="player") items=[...items].sort((a,b)=>a.p.localeCompare(b.p));
  else if(state.sortBy==="team") items=[...items].sort((a,b)=>a.t.localeCompare(b.t));
  return items;
}

          <p style="margin:0;font-size:${isMobile?11:13}px;color:#64748b">${ALL_DATA.length} 張卡片 · 3 大類 · ${ALL_TEAMS.length} 支球隊</p>
        </div>
        <div style="display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);flex-shrink:0">
          ${[["list","清單"],["stats","統計"]].map(([v,label])=>`
            <button onclick="setView('${v}')" style="padding:${isMobile?"7px 14px":"8px 18px"};border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:${state.view===v?"#6366f1":"rgba(255,255,255,0.04)"};color:${state.view===v?"#fff":"#94a3b8"};transition:all 0.2s">${label}</button>`).join("")}
        </div>
      </div>

      <!-- Search + controls row -->
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
        <div style="position:relative;flex:1;min-width:${isMobile?120:200}px">
          <input
            id="search-input"
            type="search"
            inputmode="search"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="搜尋球員、球隊、卡號…"
            value="${state.search.replace(/"/g,'&quot;')}"
            style="width:100%;padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:${isMobile?16:14}px;outline:none;font-family:inherit"
          >
          ${state.search?`<button onclick="clearSearch()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;font-size:18px;line-height:1;padding:0">×</button>`:""}
        </div>
        <select onchange="setTeam(this.value)" style="${ss}">
          <option value="All">全部球隊</option>
          ${ALL_TEAMS.map(t=>`<option value="${t}" ${state.teamFilter===t?"selected":""}>${t}</option>`).join("")}
        </select>
        <select onchange="setSub(this.value)" style="${ss}">
          <option value="All">全部類型</option>
          ${ALL_SUBTYPES.map(s=>`<option value="${s}" ${state.subFilter===s?"selected":""}>${s}</option>`).join("")}
        </select>
        <select onchange="setSort(this.value)" style="${ss}">
          <option value="number" ${state.sortBy==="number"?"selected":""}>卡號排序</option>
          <option value="player" ${state.sortBy==="player"?"selected":""}>球員排序</option>
          <option value="team" ${state.sortBy==="team"?"selected":""}>球隊排序</option>
        </select>
      </div>`;

  // Group buttons
  const groupCounts={};
  GROUP_ORDER.forEach(g=>{groupCounts[g]=ALL_DATA.filter(d=>d.group===g).length;});
  html+=`<div id="group-buttons" style="display:flex;gap:${isMobile?4:6}px;flex-wrap:wrap;margin-bottom:10px">
    <button onclick="setGroup('All')" style="padding:${isMobile?"6px 10px":"7px 16px"};border-radius:8px;border:none;font-size:${isMobile?12:13}px;font-weight:700;cursor:pointer;font-family:inherit;background:${state.groupFilter==="All"?"#6366f1":"rgba(255,255,255,0.06)"};color:${state.groupFilter==="All"?"#fff":"#94a3b8"};transition:all 0.2s">
      全部 ${!isMobile?`<span style="font-size:11px;opacity:0.7;margin-left:4px">${ALL_DATA.length}</span>`:""}
    </button>
    ${GROUP_ORDER.map(g=>`
      <button onclick="setGroup('${g}')" style="padding:${isMobile?"6px 10px":"7px 16px"};border-radius:8px;border:none;font-size:${isMobile?12:13}px;font-weight:700;cursor:pointer;font-family:inherit;background:${state.groupFilter===g?GROUP_COLORS[g]:"rgba(255,255,255,0.06)"};color:${state.groupFilter===g?"#fff":"#cbd5e1"};transition:all 0.2s;${state.groupFilter!==g?"border-bottom:2px solid "+GROUP_COLORS[g]+"40":""}">
        ${g} ${!isMobile?`<span style="font-size:11px;opacity:0.7;margin-left:4px">${groupCounts[g]}</span>`:""}
      </button>`).join("")}
    <span style="margin-left:auto;font-size:12px;color:#64748b;align-self:center">${filtered.length} / ${ALL_DATA.length} 張
      ${(state.search||state.groupFilter!=="All"||state.teamFilter!=="All"||state.subFilter!=="All"||state.rcFilter!=="All")?`<button onclick="clearFilters()" style="margin-left:8px;padding:3px 10px;border-radius:6px;border:1px solid rgba(255,100,100,0.3);background:rgba(255,100,100,0.1);color:#f87171;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">清除</button>`:""}
    </span>
  </div>`;

  // Sub-cat pills (shown when a group is selected)
  if(state.groupFilter!=="All"){
    const cats=GROUPS[state.groupFilter]||[];
    const gcol=GROUP_COLORS[state.groupFilter]||"#6366f1";
    html+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding-left:12px;border-left:3px solid ${gcol}60">
      <button onclick="setSubCat('All')" style="padding:4px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);font-size:${isMobile?11:12}px;font-weight:600;cursor:pointer;font-family:inherit;background:${state.subCatFilter==="All"?"rgba(255,255,255,0.12)":"transparent"};color:${state.subCatFilter==="All"?"#e2e8f0":"#94a3b8"};transition:all 0.2s">全部子類別</button>
      ${cats.map(c=>{
        const active=state.subCatFilter===c;
        const cnt=ALL_DATA.filter(d=>d.cat===c).length;
        return `<button onclick="setSubCat('${c.replace(/'/g,"\\'")}') " style="padding:4px 12px;border-radius:999px;border:1px solid ${active?gcol+"60":"rgba(255,255,255,0.08)"};font-size:${isMobile?11:12}px;font-weight:600;cursor:pointer;font-family:inherit;background:${active?gcol+"22":"transparent"};color:${active?gcol:"#94a3b8"};transition:all 0.2s">${c} <span style="opacity:0.7;font-size:10px">${cnt}</span></button>`;
      }).join("")}
    </div>`;
  }

  // RC filter row
  html+=`<div style="display:flex;gap:${isMobile?3:4}px;flex-wrap:wrap;margin-bottom:6px">
    ${["All","RC","Non-RC"].map(v=>`<button onclick="setRcFilter('${v}')" style="padding:${isMobile?"5px 10px":"6px 14px"};border-radius:8px;border:1px solid ${state.rcFilter===v?"#f59e0b":"rgba(255,255,255,0.1)"};background:${state.rcFilter===v?"rgba(245,158,11,0.15)":"transparent"};color:${state.rcFilter===v?"#fcd34d":"#94a3b8"};font-size:${isMobile?11:12}px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s">${v==="All"?"全部 RC 狀態":v==="Non-RC"?"非 RC":"RC 新人卡"}</button>`).join("")}
  </div>`;

  html+=`</div></div>`;

  // Main content
  html+=`<div style="max-width:1200px;margin:0 auto;padding:${isMobile?'12px 10px':'20px'}">`;

  if(state.view==="stats"){
    html+=renderStats();
  } else {
    if(!filtered.length){
      html+=`<div style="text-align:center;padding:60px 20px;color:#64748b">
        <div style="font-size:48px;margin-bottom:12px">🔭</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">找不到相符的卡片</div>
        <div style="font-size:13px">試試不同的搜尋條件</div>
      </div>`;
    } else if(isMobile){
      // Mobile: stacked card layout
      html+=`<div style="display:flex;flex-direction:column;gap:6px">`;
      filtered.forEach((card,i)=>{
        const gcolor=GROUP_COLORS[card.group]||"#6366f1";
        const players=getCardPlayers(card);
        const isCollected=!!state.collected[card.n+':'+card.cat];
        html+=`<div onclick="openModal('${players[0].name.replace(/'/g,"\\'")}') " style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:${i%2===0?'rgba(255,255,255,0.04)':'transparent'};border:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.15s" onmouseenter="this.style.background='rgba(99,102,241,0.08)'" onmouseleave="this.style.background='${i%2===0?'rgba(255,255,255,0.04)':'transparent'}'">
          <span style="font-family:'SF Mono','Cascadia Code',monospace;color:#6366f1;font-size:11px;min-width:58px;flex-shrink:0">${card.n}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${card.p}</div>
            <div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;align-items:center">
              ${cardTeamBadgesHTML(card)}
              ${card.sub&&card.sub!=="RC"?badgeHTML(card.sub):""}
              ${isRC(players[0].name)?badgeHTML("RC"):""}
            </div>
          </div>
          <span style="width:6px;height:6px;border-radius:50%;background:${gcolor};flex-shrink:0;opacity:0.8"></span>
        </div>`;
      });
      html+=`</div>`;
    } else {
      // Desktop: table layout
      html+=`<div style="background:rgba(255,255,255,0.02);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)">
        <div style="display:grid;grid-template-columns:90px 1fr 200px 120px 100px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">
          <span>卡號</span><span>球員</span><span>球隊</span><span>分類</span><span>類型</span>
        </div>`;
      filtered.forEach((card,i)=>{
        const gcolor=GROUP_COLORS[card.group]||"#6366f1";
        const players=getCardPlayers(card);
        html+=`<div onclick="openModal('${players[0].name.replace(/'/g,"\\'")}') " style="display:grid;grid-template-columns:90px 1fr 200px 120px 100px;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,0.04);background:${i%2===0?'rgba(255,255,255,0.02)':'transparent'};cursor:pointer;transition:background 0.12s;align-items:center" onmouseenter="this.style.background='rgba(99,102,241,0.06)'" onmouseleave="this.style.background='${i%2===0?'rgba(255,255,255,0.02)':'transparent'}'">
          <span style="font-family:'SF Mono','Cascadia Code',monospace;color:#6366f1;font-size:12px">${card.n}</span>
          <div style="display:flex;align-items:center;gap:6px;min-width:0">
            <span style="font-size:13px;font-weight:500;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${card.p}</span>
            ${isRC(players[0].name)?badgeHTML("RC"):""}
          </div>
          <div style="overflow:hidden">${cardTeamBadgesHTML(card)}</div>
          <div>${catBadgeHTML(card.cat,card.group)}</div>
          <div>${card.sub&&card.sub!=="RC"?badgeHTML(card.sub):""}</div>
        </div>`;
      });
      html+=`</div>`;
    }
  }

  html+=`</div>`;

  // Modal
  if(state.modalPlayer) html+=renderModal(state.modalPlayer);

  document.getElementById('root').innerHTML=html;

  // CRITICAL: attach IME-safe search event listeners
  attachSearchListeners();
}

// ============================================================
// IME-SAFE SEARCH (fixes 注音/Chinese input on mobile)
// ============================================================
function attachSearchListeners(){
  const input=document.getElementById('search-input');
  if(!input) return;

  // Track IME composition state
  input.addEventListener('compositionstart',function(){
    state.composing=true;
  });

  input.addEventListener('compositionend',function(e){
    state.composing=false;
    // Fire search AFTER composition ends (catches the final composed character)
    state.search=e.target.value;
    render();
    // Re-focus and restore cursor after render
    const el=document.getElementById('search-input');
    if(el){
      el.focus();
      try{el.setSelectionRange(el.value.length,el.value.length);}catch(e){}
    }
  });

  // Only search on input if NOT composing (prevents mid-composition renders)
  input.addEventListener('input',function(e){
    if(state.composing) return;
    state.search=e.target.value;
    render();
    // Restore focus after render
    const el=document.getElementById('search-input');
    if(el){
      el.focus();
      try{el.setSelectionRange(el.value.length,el.value.length);}catch(e){}
    }
  });

  // Handle Enter / Escape
  input.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      state.search='';
      render();
    }
  });
}

// ============================================================
// ACTIONS
// ============================================================
function setSearch(v){state.search=v;render();}
function clearSearch(){state.search='';render();}
function setRcFilter(v){state.rcFilter=v;render();}
function setGroup(g){state.groupFilter=g;state.subCatFilter="All";render();}
function setSubCat(sc){state.subCatFilter=sc;render();}
function setTeam(t){state.teamFilter=t;render();}
function setSub(s){state.subFilter=s;render();}
function setSort(s){state.sortBy=s;render();}
function setView(v){state.view=v;render();}
function openModal(p){state.modalPlayer=p;render();}
function closeModal(){state.modalPlayer=null;render();}
function toggleStatsExpand(key){state.statsExpanded[key]=!state.statsExpanded[key];render();}
function toggleStatsShowAll(key){state.statsShowAll[key]=!state.statsShowAll[key];render();}
function clearFilters(){
  state.search="";state.groupFilter="All";state.subCatFilter="All";
  state.teamFilter="All";state.subFilter="All";state.rcFilter="All";
  render();
}

render();
</script>
